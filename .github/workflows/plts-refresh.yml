name: Refresh PLTS monitoring

on:
  schedule:
    - cron: "*/5 * * * *"
  # Adds a button for manual testing.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plts-monitoring-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh monitoring data
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Call Render refresh endpoint
        env:
          REFRESH_URL: ${{ secrets.PLTS_REFRESH_URL }}
          REFRESH_SECRET: ${{ secrets.PLTS_REFRESH_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "$REFRESH_URL" ]; then
            echo "PLTS_REFRESH_URL is not configured"
            exit 1
          fi

          if [ -z "$REFRESH_SECRET" ]; then
            echo "PLTS_REFRESH_SECRET is not configured"
            exit 1
          fi

          echo "Calling PLTS refresh endpoint..."

          response_file="$(mktemp)"

          http_status="$(
            curl \
              --silent \
              --show-error \
              --location \
              --retry 2 \
              --retry-delay 10 \
              --retry-all-errors \
              --connect-timeout 30 \
              --max-time 240 \
              --request POST \
              --header "Authorization: Bearer ${REFRESH_SECRET}" \
              --header "Content-Type: application/json" \
              --data '{}' \
              --output "$response_file" \
              --write-out "%{http_code}" \
              "$REFRESH_URL"
          )"

          echo "HTTP status: $http_status"
          cat "$response_file"
          echo

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Refresh request failed"
            exit 1
          fi

          echo "PLTS refresh completed successfully"
